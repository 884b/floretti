<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Wedding Inquiry Form - Floretti</title>
</head>

<body>
    <div class="header">
        <a href="index.html"><img class="logo" src="/assets/logo_wordplus.svg" width="200"></a>
        <div class="header-right">
            <a href="cart.html"><img src="/assets/i_cart.svg" height="50"> </a>
            <button class="b-menu" onclick="openMenu()"><img src="/assets/i_burger.svg" height="50"></button>
        </div>
    </div>

    <div class="formcontent">

        <div class="formleft">
            <h1>WEDDING INQUIRY</h1>
            <p>We are so excited to hear from you! Tell us more about your special day & inquire about your dream
                florals here.</p>
            <div class="formleft-gallery">

            </div>
        </div>


        <div class="formright">
            <form id="weddingForm">
                <input type="text" id="name" placeholder="YOUR FULL NAME" required>
                <input type="text" id="pname" placeholder="PARTNER'S FULL NAME" required>
                <input type="email" id="email" placeholder="EMAIL" required>
                <input type="tel" id="phone" placeholder="PHONE" required>
                <input type="text" id="origin" placeholder="HOW DID YOU HEAR ABOUT US?">
                <input type="text" id="date" placeholder="DATE OF WEDDING (DD/MM/YY)" required>
                <input type="text" id="venue" placeholder="WEDDING VENUE" required>
                <input type="text" id="attendees" placeholder="HOW MANY WILL BE ATTENDING?" required>
                <input type="text" id="photographer" placeholder="WHO IS YOUR PHOTOGRAPHER?" required>
                <input type="text" id="moodboard" placeholder="LINK TO YOUR MOODBOARD" required>
                <input type="text" id="budget" placeholder="ESTIMATED BUDGET" required>

                <button type="submit">SUBMIT</button>
            </form>
            <p id="weddingMessage"></p>
        </div>
    </div>


    <div class="footer">
        <div class="footer-content">

            <div class="footer-left">
                <a href="index.html"><img class="logo" src="/assets/logo_word_pink.svg" width="200"></a>
            </div>

            <div class="footer-right">
                <a href="https://instagram.com/florettifloral" target="_blank">
                    <i class="fa fa-instagram" style="font-size: 30px; color:#FFF4B3;"></i>
                </a>
                <a href="https://facebook.com/florettifloral" target="_blank">
                    <i class="fa fa-facebook-square" style="font-size: 30px; color:#FFF4B3;"></i>
                </a>
            </div>

        </div>

        <div id="burgerMenu" class="burgerreveal">
            <nav>
                <a href="index.html">home</a>
                <a href="wedding-inquiry.html">book a wedding</a>
                <a href="event-inquiry.html">book an event</a>
                <a href="shop.html">shop</a>
                <a href="gallery.html">gallery</a>
                <a href="about.html">about</a>
                <a href="contact.html">contact</a>
            </nav>
            <button class="b-menu" onclick="closeMenu()"><img src="/assets/i_arrow.svg"></button>
        </div>

        <script src="/js/scripts.js"></script>
</body>

</html>
